# p3.sumzip.com 리버스 프록시 (nginx)
# /etc/nginx/sites-available/p3.sumzip.com 에 배치 후 심볼릭 링크 + reload.

server {
    listen 80;
    server_name p3.sumzip.com;

    # 백엔드 API → 9523
    location /v1/ {
        proxy_pass         http://127.0.0.1:9523;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 → 9503
    location / {
        proxy_pass         http://127.0.0.1:9503;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# HTTPS 는 certbot 으로 인증서 발급 후 자동 구성:
#   sudo certbot --nginx -d p3.sumzip.com
