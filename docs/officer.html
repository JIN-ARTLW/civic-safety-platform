<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>관제 대시보드 · Civic Safety</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="officer">
  <div class="topbar">
    <h1>🏛 지자체 관제 대시보드</h1>
    <span class="tag">서울 중구청 (파일럿)</span>
    <a href="index.html">← 시민 신고</a>
  </div>

  <div class="wrap">
    <div class="row">
      <div class="card"><div class="muted">전체 신고</div><div class="kpi" id="kTotal">0</div></div>
      <div class="card"><div class="muted">처리 대기</div><div class="kpi" id="kPending">0</div></div>
      <div class="card"><div class="muted">처리 완료</div><div class="kpi" id="kDone">0</div></div>
    </div>

    <div class="card">
      <div class="row" style="align-items:flex-end">
        <div>
          <label>상태 필터</label>
          <select id="fStatus" onchange="load()">
            <option value="">전체</option><option value="received">접수</option><option value="in_progress">처리중</option>
            <option value="done">완료</option><option value="rejected">반려</option><option value="invalid">무효</option>
          </select>
        </div>
        <div><label>&nbsp;</label><button class="ghost" onclick="load()">새로고침</button></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">신고 목록 (우선순위순 · 테넌트 격리)</h3>
      <table>
        <thead><tr><th>사진</th><th>접수번호</th><th>유형(AI탐지)</th><th>담당</th><th>우선</th><th>묶음</th><th>상태</th><th>처리</th></tr></thead>
        <tbody id="rows"><tr><td colspan="7" class="muted">불러오는 중...</td></tr></tbody>
      </table>
    </div>

    <div class="card hidden" id="docCard">
      <h3 style="margin-top:0">📄 자동 생성 공문서 초안</h3>
      <pre id="docContent" style="white-space:pre-wrap; background:#f4f4f4; padding:14px; font-size:13px"></pre>
    </div>
  </div>

  <script src="civic.js"></script>
  <script>
    var TENANT = 'tnt-seoul-jung';
    function load() {
      var status = document.getElementById('fStatus').value;
      var rows = CivicAPI.officerList(TENANT, { status: status || undefined });
      var all = CivicAPI.officerList(TENANT, {});
      document.getElementById('kTotal').textContent = all.length;
      document.getElementById('kPending').textContent = all.filter(function (r) { return r.status === 'received' || r.status === 'in_progress'; }).length;
      document.getElementById('kDone').textContent = all.filter(function (r) { return r.status === 'done'; }).length;
      var tbody = document.getElementById('rows');
      if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="muted">신고 없음 — 시민 신고 페이지에서 먼저 제출해 보세요.</td></tr>'; return; }
      tbody.innerHTML = '';
      rows.forEach(function (r) {
        var tr = document.createElement('tr');
        var next = { received: 'in_progress', in_progress: 'done' }[r.status];
        var img = (r.photo_url && r.photo_url.indexOf('data:image') === 0) ? '<img src="' + r.photo_url + '" style="width:54px;height:40px;object-fit:cover;border-radius:4px" />' : '—';
        var objs = (r.detected_objects && r.detected_objects.length) ? r.detected_objects.slice(0, 3).map(function (o) { return o.label; }).join(', ') : '';
        tr.innerHTML = '<td>' + img + '</td><td>' + r.tracking_no + '</td><td>' + (r.category || '미분류') + (objs ? '<br><span class="muted" style="font-size:11px">🧠 ' + objs + '</span>' : '') + '</td><td>' + (r.department || '-') + '</td><td>P' + r.priority + '</td><td>' + (r.cluster && r.cluster.report_count > 1 ? '×' + r.cluster.report_count : '-') + '</td><td><span class="badge ' + r.status + '">' + r.status + '</span></td><td></td>';
        var actions = tr.lastElementChild;
        if (next) { var b = document.createElement('button'); b.className = 'ghost'; b.textContent = next === 'in_progress' ? '처리시작' : '완료'; b.onclick = function () { var res = CivicAPI.changeStatus(r.id, next); if (res.error) alert(res.message); load(); }; actions.appendChild(b); }
        var d = document.createElement('button'); d.className = 'ghost'; d.textContent = '공문서'; d.style.marginLeft = '6px'; d.onclick = function () { genDoc(r.id); }; actions.appendChild(d);
        tbody.appendChild(tr);
      });
    }
    function genDoc(id) {
      var d = CivicAPI.genDoc(id);
      document.getElementById('docCard').classList.remove('hidden');
      document.getElementById('docContent').textContent = d.content || JSON.stringify(d);
      window.scrollTo(0, document.body.scrollHeight);
    }
    window.load = load; window.genDoc = genDoc;
    load();
  </script>
</body>
</html>
