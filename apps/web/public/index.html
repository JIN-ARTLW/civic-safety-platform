<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>시민 안전 신고 · Civic Safety</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="citizen">
  <div class="topbar">
    <h1>📷 시민 안전 신고</h1>
    <span class="tag">사진 한 장으로 3초 신고 · 실제 AI 분석</span>
    <a href="officer.html">관제 대시보드 →</a>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="steps"><div class="step active" id="s1"></div><div class="step" id="s2"></div><div class="step" id="s3"></div></div>
      <h2 style="margin-top:0">위험 요소 신고하기</h2>

      <label>1) 사진 촬영/업로드 (실제 이미지를 AI가 분석합니다)</label>
      <input id="photoFile" type="file" accept="image/*" capture="environment" onchange="onPhoto(event)" />
      <div id="previewWrap" class="hidden" style="margin-top:10px">
        <img id="preview" style="max-width:100%;border-radius:10px" alt="미리보기" />
        <p id="aiOut" class="muted">🧠 AI 분석 대기…</p>
      </div>
      <p class="muted">사진은 자동 분석 후 비식별 처리되어 저장됩니다.</p>

      <div class="row">
        <div><label>2) 위치 (위도)</label><input id="lat" type="number" step="0.0001" value="37.5636" /></div>
        <div><label>위치 (경도)</label><input id="lng" type="number" step="0.0001" value="126.9976" /></div>
      </div>
      <p class="muted">📍 서울 중구 일대(파일럿 관할). 관할 밖이면 안내됩니다. <a href="#" onclick="useGeo();return false">현재 위치 사용</a></p>

      <label>3) 위험 유형 (AI 자동 분류 — 필요시 수정)</label>
      <select id="category"><option value="">자동 분류</option></select>

      <div style="margin-top:18px"><button id="submitBtn" onclick="submitReport()" disabled>사진을 먼저 첨부하세요</button></div>
    </div>

    <div class="card hidden" id="result">
      <h3 style="margin-top:0">✅ 접수 완료</h3>
      <p>접수번호: <b id="rTracking"></b> <span id="rBadge" class="badge received"></span></p>
      <p id="rCat" class="muted"></p>
      <div id="rCandidates" class="hidden">
        <p class="muted">AI 신뢰도가 낮습니다. 유형을 선택해 다시 제출해 주세요:</p>
        <div id="candBtns" class="row"></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">🔎 접수번호로 상태 조회</h3>
      <div class="row"><input id="trackInput" placeholder="CSR-2026-00001" /><button class="ghost" onclick="checkStatus()">조회</button></div>
      <p id="statusOut" class="muted"></p>
    </div>

    <div class="card">
      <h3 style="margin-top:0">💬 AI 대화형 안내</h3>
      <div class="chat" id="chat"></div>
      <div class="row" style="margin-top:10px"><input id="chatInput" placeholder="예: CSR-2026-00001 어떻게 됐나요?" /><button class="ghost" onclick="sendChat()">전송</button></div>
    </div>
  </div>

  <!-- 브라우저 비전: CLIP 제로샷 분류 (Transformers.js) -->
  <script src="vision.js"></script>
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.4';
    env.allowLocalModels = false;
    window.CivicVision.setPipeline(pipeline, env);
  </script>
  <script>
    const API = (location.port === '9503')
      ? `${location.protocol}//${location.hostname}:9523/v1`
      : '/v1';
    let photoDataUrl = null, photoName = null, aiResult = null;

    (function () {
      var sel = document.getElementById('category');
      [['ROAD_DAMAGE','도로 파손(포트홀 등)'],['FACILITY_DAMAGE','시설물 훼손'],['FLOOD_RISK','침수/치수 위험'],['SAFETY_THREAT','안전 위협(표지판/낙하물 등)'],['ETC','기타']]
        .forEach(function(c){ var o=document.createElement('option'); o.value=c[0]; o.textContent=c[1]; sel.appendChild(o); });
    })();

    function setSteps(n){ ['s1','s2','s3'].forEach(function(id,i){ document.getElementById(id).classList.toggle('active', i<n); }); }
    function dev(){ var d=localStorage.getItem('dev'); if(!d){ d=Math.random().toString(36).slice(2); localStorage.setItem('dev',d);} return 'anon-'+d; }

    async function onPhoto(e){
      var file = e.target.files && e.target.files[0]; if(!file) return;
      photoName = file.name;
      var url = URL.createObjectURL(file);
      var img = document.getElementById('preview');
      document.getElementById('previewWrap').classList.remove('hidden');
      var ai = document.getElementById('aiOut'); var btn = document.getElementById('submitBtn');
      setSteps(2);
      img.onload = async function(){
        photoDataUrl = CivicVision.downscale(img, 640, 0.7);   // 경량화 저장본
        ai.textContent = '🧠 AI 분석 중…';
        // 1순위: 서버 Claude 비전(키가 서버에 설정된 경우) — 5개 유형 의미 분류
        try {
          var cv = await fetch(`${API}/vision/classify`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ photo: photoDataUrl }) });
          if (cv.ok) {
            var cd = await cv.json();
            if (!cd.error && cd.category_code) {
              aiResult = cd;
              var catName = document.querySelector('#category option[value="'+cd.category_code+'"]').textContent;
              ai.innerHTML = '🧠 <b>Claude 비전</b> 분석<br>📌 <b>유형</b>: '+catName+' · 신뢰도 '+(cd.confidence*100).toFixed(0)+'%<br>📝 '+(cd.summary||'');
              document.getElementById('category').value = cd.category_code;
              enable(); return;
            }
          }
        } catch(e){ /* 백엔드 없거나 키 미설정 → 로컬 모델로 폴백 */ }
        // 2순위: 브라우저 비전(CLIP 제로샷) — 5개 유형 의미 분류
        ai.textContent = '🧠 브라우저 AI 분석 중… (최초 1회 모델 다운로드, 수십 초 걸릴 수 있음)';
        try {
          aiResult = await CivicVision.analyze(photoDataUrl, img);
          var objs = aiResult.objects.length ? aiResult.objects.map(function(o){return o.label+'('+(o.score*100).toFixed(0)+'%)';}).join(', ') : '';
          var catName2 = aiResult.category_code ? document.querySelector('#category option[value="'+aiResult.category_code+'"]').textContent : '미정(직접 선택 필요)';
          ai.innerHTML = '🧠 <b>브라우저 비전(CLIP)</b><br>📌 <b>추천 유형</b>: '+catName2+' · 신뢰도 '+(aiResult.confidence*100).toFixed(0)+'%<br>📝 '+aiResult.summary+(objs?('<br>🔎 '+objs):'');
          if (aiResult.category_code) document.getElementById('category').value = aiResult.category_code;
        } catch(err){ ai.textContent='AI 분석 오류: '+err+' — 유형을 직접 선택해 제출하세요.'; }
        enable();
      };
      img.src = url;
      function enable(){ btn.disabled=false; btn.textContent='신고 제출'; setSteps(1); }
    }

    function useGeo(){
      if(!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(function(p){
        document.getElementById('lat').value=p.coords.latitude.toFixed(5);
        document.getElementById('lng').value=p.coords.longitude.toFixed(5);
      });
    }

    async function submitReport(){
      if(!photoDataUrl){ alert('사진을 먼저 첨부하세요.'); return; }
      var btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='제출 중...'; setSteps(3);
      var body={
        photo: photoDataUrl, photoName: photoName,
        lat: parseFloat(document.getElementById('lat').value),
        lng: parseFloat(document.getElementById('lng').value),
        category_code: document.getElementById('category').value || (aiResult&&aiResult.category_code) || undefined,
        confidence: aiResult ? aiResult.confidence : undefined,
        objects: aiResult ? aiResult.objects : undefined,
        device_token: dev(), captured_at: new Date().toISOString(),
      };
      try{
        var res=await fetch(`${API}/reports`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        var data=await res.json();
        if(!res.ok){ alert('오류: '+JSON.stringify(data.errors||data)); return; }
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('rTracking').textContent=data.tracking_no;
        document.getElementById('rBadge').textContent=data.status;
        document.getElementById('trackInput').value=data.tracking_no;
        var cat=data.category?('분류: '+data.category+' (신뢰도 '+(data.classification_confidence*100).toFixed(0)+'%)'):'분류: 미정';
        cat += data.out_of_jurisdiction?' · ⚠️ 관할 외 지역':(' · 관할: '+data.tenant);
        if(data.clustered_into) cat+=' · 유사 신고와 묶음 처리됨';
        document.getElementById('rCat').textContent=cat;
        var wrap=document.getElementById('rCandidates'), cb=document.getElementById('candBtns'); cb.innerHTML='';
        if(data.candidate_categories&&data.candidate_categories.length){ wrap.classList.remove('hidden');
          data.candidate_categories.forEach(function(code){ var b=document.createElement('button'); b.className='ghost'; b.textContent=code; b.onclick=function(){ document.getElementById('category').value=code; submitReport(); }; cb.appendChild(b); });
        } else wrap.classList.add('hidden');
      }catch(e){ alert('네트워크 오류: '+e); }
      finally{ btn.disabled=false; btn.textContent='신고 제출'; setSteps(1); }
    }

    async function checkStatus(){
      var t=document.getElementById('trackInput').value.trim(); if(!t) return;
      var res=await fetch(`${API}/reports/${encodeURIComponent(t)}`); var out=document.getElementById('statusOut');
      if(!res.ok){ out.textContent='해당 접수번호를 찾을 수 없습니다.'; return; }
      var d=await res.json();
      out.innerHTML='상태: <b>'+d.status+'</b> · 유형: '+(d.category||'미정')+' · 담당: '+(d.department||'-')+' · 접수: '+new Date(d.submitted_at).toLocaleString('ko-KR');
    }
    function addBubble(text,who,sources){ var c=document.getElementById('chat'); var b=document.createElement('div'); b.className='bubble '+who; b.textContent=text; c.appendChild(b); if(sources&&sources.length){ var s=document.createElement('div'); s.className='sources'; s.textContent='근거: '+sources.join(', '); c.appendChild(s);} c.scrollTop=c.scrollHeight; }
    async function sendChat(){ var inp=document.getElementById('chatInput'); var msg=inp.value.trim(); if(!msg) return; addBubble(msg,'me'); inp.value=''; var tn=(msg.match(/CSR-\d{4}-\d{5}/)||[])[0]; var res=await fetch(`${API}/assistant/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,tracking_no:tn})}); var d=await res.json(); addBubble(d.reply,'bot',d.sources); }
    window.onPhoto=onPhoto; window.useGeo=useGeo; window.submitReport=submitReport; window.checkStatus=checkStatus; window.sendChat=sendChat;
    addBubble('안녕하세요! 사진을 첨부하면 AI가 위험 유형을 분석합니다.', 'bot');
  </script>
</body>
</html>
